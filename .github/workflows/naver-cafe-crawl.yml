# 구피사랑 카페 크롤 — 6시간마다 + 수동 실행
#
# 기본 추천: CAFE_CRAWL_POST_URL 시크릿을 만들지 않으면 → B) 러너에서 npm run cafe:crawl
# 나중에 배포 URL이 안정되면: CAFE_CRAWL_POST_URL 설정 → A) curl만
#
# GitHub은 if: 안에서 secrets를 쓸 수 없어, 첫 단계에서 env로 받아 출력 변수로만 분기합니다.
# 시크릿·변수는 README「GitHub Actions — 네이버 카페 크롤」참고

name: Naver cafe crawl

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

concurrency:
  group: naver-cafe-crawl-${{ github.ref }}
  cancel-in-progress: true

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - id: resolve
        name: Resolve crawl mode (secrets are not allowed in if)
        env:
          CAFE_CRAWL_POST_URL: ${{ secrets.CAFE_CRAWL_POST_URL }}
        run: |
          if [ -n "${CAFE_CRAWL_POST_URL:-}" ]; then
            echo "use_curl=1" >> "$GITHUB_OUTPUT"
          else
            echo "use_curl=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger remote crawl API
        if: steps.resolve.outputs.use_curl == '1'
        env:
          URL: ${{ secrets.CAFE_CRAWL_POST_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -e
          if [ -n "${CRON_SECRET:-}" ]; then
            curl -fsS -X POST "$URL" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${CRON_SECRET}" \
              -d '{}'
          else
            curl -fsS -X POST "$URL" \
              -H "Content-Type: application/json" \
              -d '{}'
          fi
          echo "Remote crawl POST ok"

      - uses: actions/checkout@v4
        if: steps.resolve.outputs.use_curl == '0'

      - uses: actions/setup-node@v4
        if: steps.resolve.outputs.use_curl == '0'
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        if: steps.resolve.outputs.use_curl == '0'
        run: npm ci

      - name: Prisma generate
        if: steps.resolve.outputs.use_curl == '0'
        run: npx prisma generate

      - name: Sync DB schema (SQLite 등 빈 DB에 테이블 생성)
        if: steps.resolve.outputs.use_curl == '0'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          set -e
          if [ -z "${DATABASE_URL:-}" ]; then
            echo "DATABASE_URL secret is required before db push."
            exit 1
          fi
          npx prisma db push --skip-generate

      - name: Install Playwright Chromium
        if: steps.resolve.outputs.use_curl == '0'
        run: PLAYWRIGHT_BROWSERS_PATH=0 npx playwright install --with-deps chromium

      - name: Write naver session from secret
        if: steps.resolve.outputs.use_curl == '0'
        env:
          NAVER_CAFE_SESSION_JSON: ${{ secrets.NAVER_CAFE_SESSION_JSON }}
        run: |
          set -e
          if [ -z "${NAVER_CAFE_SESSION_JSON:-}" ]; then
            echo "Either set CAFE_CRAWL_POST_URL (remote crawl) or NAVER_CAFE_SESSION_JSON (runner crawl)."
            exit 1
          fi
          mkdir -p storage
          node -e "require('fs').writeFileSync('storage/naver-session.json', process.env.NAVER_CAFE_SESSION_JSON)"

      - name: Run cafe crawl CLI
        if: steps.resolve.outputs.use_curl == '0'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_CAFE_WEBHOOK_URL: ${{ secrets.DISCORD_CAFE_WEBHOOK_URL }}
          NAVER_CAFE_DEBUG: "1"
          NAVER_CAFE_CRAWL_MAX_LIST: ${{ vars.NAVER_CAFE_CRAWL_MAX_LIST }}
          NAVER_CAFE_CRAWL_MAX_DETAILS: ${{ vars.NAVER_CAFE_CRAWL_MAX_DETAILS }}
        run: |
          set -e
          if [ -z "${DATABASE_URL:-}" ]; then
            echo "DATABASE_URL secret is required when running crawl on the runner."
            exit 1
          fi
          PLAYWRIGHT_BROWSERS_PATH=0 npm run cafe:crawl
